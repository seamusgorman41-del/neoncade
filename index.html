<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body style="margin: 0; background: #0a0a0a;">
    <div id="root">
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: #00FF00; font-family: monospace; flex-direction: column;">
        <h1 style="font-size: 1.5rem; margin-bottom: 1rem;">NEON_ARCADE_v1.0.5</h1>
        <div style="width: 30px; height: 30px; border: 2px solid #00FF00; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 1rem; opacity: 0.5;">SYSTEM_BOOT_SEQUENCE_ACTIVE</p>
      </div>
    </div>
    
    <!-- PERSISTENT DEBUG CONSOLE -->
    <div id="debug-log" style="position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); color: #00FF00; font-family: monospace; font-size: 10px; padding: 10px; border-top: 1px solid #333; z-index: 9999; max-height: 100px; overflow-y: auto; pointer-events: none;">
      <div>[SYSTEM] WAITING_FOR_JAVASCRIPT_ENTRY...</div>
    </div>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    
    <script>
      const log = (msg) => {
        const div = document.createElement('div');
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        document.getElementById('debug-log').appendChild(div);
        console.log(msg);
      };
      window.onerror = (m, u, l) => log(`ERROR: ${m} at ${l}`);
      log('HTML_LOADED_SUCCESSFULLY');
    </script>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
